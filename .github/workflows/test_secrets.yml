name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-15
    steps:
    - name: Import Certificates
      env:
        DEV_ID_APP_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
        DEV_ID_INSTALLER_P12: ${{ secrets.DEVELOPER_ID_INSTALLER_P12 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/test.keychain-db
        KEYCHAIN_PASSWORD=testpass
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        
        echo "$DEV_ID_APP_P12" | base64 --decode > $RUNNER_TEMP/dev_app.p12
        security import $RUNNER_TEMP/dev_app.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        
        echo "$DEV_ID_INSTALLER_P12" | base64 --decode > $RUNNER_TEMP/dev_installer.p12
        security import $RUNNER_TEMP/dev_installer.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"
    
    - name: Test Notary Credentials
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      run: |
        xcrun notarytool store-credentials "CI_NOTARY" \
          --apple-id "$APPLE_ID" \
          --team-id "$APPLE_TEAM_ID" \
          --password "$APPLE_APP_PASSWORD"
        
        # We can't fully test notary without submitting, but store-credentials will succeed.
        # Actually store-credentials does local validation of the password format.
        echo "Notary credentials stored successfully."
